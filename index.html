<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的电商小铺</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.snipcart.com/themes/v3.0.31/default/snipcart.js"></script>
  <style>
    .product-card { transition: transform 0.2s; }
    .product-card:hover { transform: translateY(-5px); }
  </style>
</head>
<body>

<!-- Snipcart 购物车容器 -->
<div hidden id="snipcart" data-api-key="YOUR_SNIPCART_KEY"></div>

<div class="container py-5">
  <h1 class="text-center mb-4">✨ 限时特惠 ✨</h1>
  
  <div class="row g-4">
    <!-- 商品1 -->
    <div class="col-md-4">
      <div class="card product-card">
        <img src="https://via.placeholder.com/300x200?text=商品1" class="card-img-top" alt="商品1">
        <div class="card-body">
          <h5 class="card-title">复古帆布包</h5>
          <p class="text-muted">手工制作 | 棉麻材质</p>
          <p class="h4">¥89.00</p>
          <button class="btn btn-primary w-100" 
            data-item-id="bag-001"
            data-item-name="复古帆布包"
            data-item-price="89"
            data-item-url="/"
            data-item-image="https://via.placeholder.com/300x200?text=商品1"
            data-item-custom1-name="颜色"
            data-item-custom1-options="黑色,米色,深蓝"
            data-item-custom2-name="尺寸"
            data-item-custom2-options="小号,中号,大号"
            data-item-custom2-required="true"
            data-item-stackable="true"
            data-item-shippable="true"
            >加入购物车</button>
        </div>
      </div>
    </div>

    <!-- 商品2 -->
    <div class="col-md-4">
      <div class="card product-card">
        <img src="https://via.placeholder.com/300x200?text=商品2" class="card-img-top" alt="商品2">
        <div class="card-body">
          <h5 class="card-title">陶瓷马克杯</h5>
          <p class="text-muted">景德镇手工 | 容量350ml</p>
          <p class="h4">¥45.00</p>
          <button class="btn btn-primary w-100" 
            data-item-id="cup-001"
            data-item-name="陶瓷马克杯"
            data-item-price="45"
            data-item-url="/"
            data-item-image="https://via.placeholder.com/300x200?text=商品2"
            >加入购物车</button>
        </div>
      </div>
    </div>

    <!-- 商品3 -->
    <div class="col-md-4">
      <div class="card product-card">
        <img src="https://via.placeholder.com/300x200?text=商品3" class="card-img-top" alt="商品3">
        <div class="card-body">
          <h5 class="card-title">无线蓝牙耳机</h5>
          <p class="text-muted">降噪 | 20小时续航</p>
          <p class="h4">¥199.00</p>
          <button class="btn btn-primary w-100" 
            data-item-id="earbuds-001"
            data-item-name="无线蓝牙耳机"
            data-item-price="199"
            data-item-url="/"
            data-item-image="https://via.placeholder.com/300x200?text=商品3"
            >加入购物车</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 购物车按钮 -->
  <div class="d-flex justify-content-center mt-5">
    <button class="snipcart-checkout btn btn-lg btn-success">
      <i class="bi bi-cart"></i> 查看购物车 (0)
    </button>
  </div>
</div>

<script>
  // 初始化 Snipcart
  document.addEventListener('snipcart.ready', () => {
    console.log('Snipcart 已加载');
  });
</script>
</body>
</html>

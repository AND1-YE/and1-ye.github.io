<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的产品展示</title>
  <style>
    body{font-family:Arial;margin:0;padding:20px;background:#f6f6f6}
    .container{max-width:900px;margin:auto;background:white;padding:30px;border-radius:12px}
    .product{display:flex;gap:20px;margin-bottom:30px;border-bottom:1px solid #eee;padding-bottom:20px}
    .product img{width:180px;height:auto;border-radius:8px}
    .info h2{margin-top:0}
    .price{color:red;font-size:18px}
  </style>
</head>
<body>
  <div class="container">
    <h1>我的产品展示</h1>

    <div class="product">
      <img src="https://picsum.photos/600/400?1">
      <div class="info">
        <h2>产品 1</h2>
        <p>产品介绍写在这里</p>
        <div class="price">¥99</div>
      </div>
    </div>

    <div class="product">
      <img src="https://picsum.photos/600/400?2">
      <div class="info">
        <h2>产品 2</h2>
        <p>产品介绍写在这里</p>
        <div class="price">¥129</div>
      </div>
    </div>
  </div>
</body>
</html>
